<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaPipe → OSC</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, sans-serif;
        background: #111;
        color: #eee;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
        gap: 1.5rem;
      }

      h1 { font-size: 1.4rem; letter-spacing: 0.05em; }

      .controls {
        display: flex;
        gap: 1rem;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
      }

      label { font-size: 0.85rem; color: #aaa; }

      input[type="text"], input[type="number"] {
        background: #222;
        border: 1px solid #444;
        color: #eee;
        padding: 0.35rem 0.6rem;
        border-radius: 4px;
        width: 9rem;
        font-size: 0.9rem;
      }

      .task-checks {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }

      .task-checks label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.9rem;
        color: #eee;
        cursor: pointer;
      }

      .task-checks input[type="checkbox"] {
        width: 1rem;
        height: 1rem;
        accent-color: #2a6;
        cursor: pointer;
      }

      .video-wrap {
        position: relative;
        width: 640px;
        max-width: 100%;
      }

      video, canvas {
        display: block;
        width: 100%;
        border-radius: 6px;
      }

      canvas {
        position: absolute;
        top: 0; left: 0;
      }

      #status {
        font-size: 0.8rem;
        color: #888;
        min-height: 1.2em;
      }

      #osc-debug {
        font-family: ui-monospace, monospace;
        font-size: 0.75rem;
        line-height: 1.8;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 0.75rem 1rem;
        width: 640px;
        max-width: 100%;
        overflow-x: auto;
        cursor: text;
      }

      .osc-row {
        display: block;
        white-space: pre;
        color: #444;          /* disabled */
        transition: color 0.15s;
        user-select: all;
      }

      .osc-row.enabled  { color: #555; }   /* on, nothing detected */
      .osc-row.sending  { color: #e0e0e0; } /* on + currently detected */
    </style>
  </head>
  <body>
    <h1>MediaPipe → OSC</h1>

    <div class="controls">
      <div>
        <label>Tasks</label><br />
        <div class="task-checks">
          <label><input type="checkbox" id="chk-hand" /> Hands</label>
          <label><input type="checkbox" id="chk-face" /> Face</label>
          <label><input type="checkbox" id="chk-pose" /> Pose</label>
        </div>
      </div>

      <div>
        <label for="osc-host">OSC Host</label><br />
        <input id="osc-host" type="text" value="127.0.0.1" />
      </div>

      <div>
        <label for="osc-port">OSC Port</label><br />
        <input id="osc-port" type="number" value="9000" />
      </div>

    </div>

    <div class="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
    </div>

    <div id="status">Initializing…</div>
    <div id="osc-debug">
      <span class="osc-row" id="dbg-hand0"></span>
      <span class="osc-row" id="dbg-hand1"></span>
      <span class="osc-row" id="dbg-face"></span>
      <span class="osc-row" id="dbg-pose"></span>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
